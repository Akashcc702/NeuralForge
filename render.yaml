services:
  - type: web
    name: vibecraft
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL
        value: google/gemma-2-4b-it
      - key: SITE_URL
        sync: false
